<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta-V Analysis - Debriefing Room</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="analysis.css">
</head>

<body>

    <header>
        <h1>📂 Mission Debrief <span class="badge">ANALYSIS</span></h1>
        <div class="toolbar">
            <button id="load-new-btn" aria-haspopup="dialog">Load New Log</button>
            <button>Export Report</button>
        </div>
    </header>

    <main>
        <div id="view-panel">
            <!-- 3D/Map View Canvas -->
            <canvas id="visualizer-canvas"></canvas>

            <div class="status-overlay">
                <div>T+ <span id="disp-time">00:00</span></div>
                <div>ALT: <span id="disp-alt">0</span> m</div>
                <div>VEL: <span id="disp-vel">0</span> m/s</div>
            </div>
        </div>

        <div id="charts-panel">
            <div class="chart-container">
                <div class="chart-title">ALTITUDE (m)</div>
                <canvas id="chart-alt"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">VELOCITY (m/s)</div>
                <canvas id="chart-vel"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">THROTTLE (%)</div>
                <canvas id="chart-throttle"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Q (Dynamic Pressure)</div>
                <canvas id="chart-q"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <div id="scrubber-container">
            <span class="time-label">00:00</span>
            <input type="range" id="time-scrubber" min="0" max="100" value="0" step="0.1">
            <span id="duration-label" class="time-label">10:00</span>
        </div>
        <div class="playback-controls">
            <button class="control-btn" id="btn-prev" aria-label="Previous Frame" title="Previous Frame">⏮</button>
            <button class="control-btn primary" id="btn-play" aria-label="Play/Pause" aria-pressed="false" title="Play/Pause">▶</button>
            <button class="control-btn" id="btn-next" aria-label="Next Frame" title="Next Frame">⏭</button>
        </div>
    </footer>

    <!-- Upload Overlay -->
    <div id="upload-overlay" role="dialog" aria-modal="true" aria-labelledby="upload-title">
        <label class="upload-box" id="drop-zone">
            <h1 id="upload-title">Drag & Drop Flight Log</h1>
            <p>or click to browse (.csv, .json)</p>
            <input type="file" id="file-input" accept=".csv,.json">
        </label>
    </div>

    <!-- Application Script -->
    <script type="module" src="dist/analysis.bundle.js"></script>
</body>

</html>
